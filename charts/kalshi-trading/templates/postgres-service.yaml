apiVersion: v1
kind: Service
metadata:
  name: kalshi-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kalshi.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "kalshi.postgres.selectorLabels" . | nindent 4 }}
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
