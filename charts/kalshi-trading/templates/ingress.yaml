{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kalshi-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kalshi.labels" . | nindent 4 }}
  annotations:
    # Traefik-specific annotations for k3s
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    # Streamlit dashboard — served at the root
    - host: {{ .Values.ingress.streamlitHost }}
      http:
        paths:
          - path: {{ .Values.ingress.streamlitPath }}
            pathType: Prefix
            backend:
              service:
                name: kalshi-streamlit
                port:
                  number: 8501
    # Backend API — served under /api
    - host: {{ .Values.ingress.backendHost }}
      http:
        paths:
          - path: {{ .Values.ingress.backendPath }}
            pathType: Prefix
            backend:
              service:
                name: kalshi-backend
                port:
                  number: 8000
{{- end }}
