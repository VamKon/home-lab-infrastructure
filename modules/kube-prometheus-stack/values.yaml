defaultRules:
  disabled:
    # 1. Disable the default 15-minute alert by name
    KubePodNotReady: true

additionalPrometheusRulesMap:
  custom-rules:
    groups:
      - name: custom-kubernetes-alerts
        rules:
          # 2. Recreate the alert with a 1-minute 'for' duration
          - alert: KubePodNotReady
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not ready."
              description: "Pod has been in a non-ready state for longer than 1 minute."
            # Simplified expression to catch failing/pending pods
            expr: kube_pod_status_phase{phase=~"Pending|Unknown|Failed"} == 1

grafana:
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.vamseekonda.com

alertmanager:
  config:
    global:
      resolve_timeout: 5m
      slack_api_url: "${slack_api_url}"
    route:
      group_by: ['namespace', 'alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'slack-notifications'
      routes:
        - matchers:
            - alertname = Watchdog
          receiver: 'null'
        - matchers:
            - alertname = InfoInhibitor
          receiver: 'null'
    receivers:
      - name: 'null'
      - name: 'slack-notifications'
        slack_configs:
          - channel: '#grafana-alerts' # Replace with your Slack channel name
            send_resolved: true
            title_link: 'https://grafana.vamseekonda.com/alerting/list'
            title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
            text: |-
              {{ range .Alerts -}}
              *Alert:* <https://grafana.vamseekonda.com/alerting/list?search={{ .Labels.alertname }}|{{ .Annotations.summary }}>
              *Description:* {{ .Annotations.description }}
              *Severity:* `{{ .Labels.severity }}`
              {{ if .Annotations.runbook_url }}*Runbook:* <{{ .Annotations.runbook_url }}|Click Here>{{ end }}
              {{ if .Annotations.dashboard_url }}*Dashboard:* <{{ .Annotations.dashboard_url }}|View Dashboard>{{ end }}
              *Details:*
              {{ range .Labels.SortedPairs }} • *{{ .Name }}:* `{{ .Value }}`
              {{ end }}
              ---
              {{ end }}